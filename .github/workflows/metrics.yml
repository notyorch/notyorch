name: Generate Metrics

on:
  # Run automatically every day at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Run on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate general metrics
        uses: lowlighter/metrics@latest
        with:
          # A personal access token (classic) with `repo` scope, stored as
          # a repository secret named METRICS_TOKEN. See README setup notes.
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata

          # Languages used across repositories
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: 0:python, 1:js, 2:ts
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%

          # Coding habits and activity
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200

          # Isometric commit calendar (last full year)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
